{{ define "main" }}
{{ $recordDate := .Date }}
{{ with .File }}
  {{ if findRE "^\\d{4}-\\d{2}$" .BaseFileName }}
    {{ $recordDate = time.AsTime (printf "%s-01" .BaseFileName) }}
  {{ end }}
{{ end }}

<article class="page-header">
  <p class="eyebrow">{{ $recordDate.Format "January 2006" }}</p>
  <h1>{{ .Title }}</h1>
</article>

<section class="card">
  {{ .Content }}
</section>
{{ end }}
