<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Params.lab_name }} home">
      <img src="{{ "images/logo/example-lab-logo.svg" | relURL }}" alt="{{ site.Params.lab_name }}">
    </a>
    <nav>
      <ul class="nav-list">
        {{ range site.Menus.main }}
          <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
    {{ with site.Params.repository_url }}
    <a class="clone-button" href="{{ . }}" target="_blank" rel="noopener">Clone Me</a>
    {{ end }}
  </div>
</header>
